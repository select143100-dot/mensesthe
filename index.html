<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE ESTHE - 受付システム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#B8964A;--gold-l:#D4AF6A;--gold-d:#8A6E2F;
  --dark:#1A1A1A;--dark2:#222222;--dark3:#2A2A2A;--dark4:#333333;--dark5:#3E3E3E;
  --tp:#F0E8D0;--ts:#A0927A;--tm:#6A5E50;
  --bdr:#3A3330;--r:8px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--dark);color:var(--tp)}
.app{min-height:100vh;display:flex;flex-direction:column}
.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;min-height:100vh}
.login-box{background:var(--dark2);border:1px solid var(--bdr);border-radius:12px;padding:32px 28px;width:100%;max-width:360px}
.login-logo{text-align:center;font-size:22px;font-weight:600;color:var(--gold);letter-spacing:3px;margin-bottom:6px}
.login-sub{text-align:center;font-size:13px;color:var(--tm);margin-bottom:24px}
.topbar{background:var(--dark2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;padding:10px 16px;flex-shrink:0;position:sticky;top:0;z-index:10}
.logo{font-size:15px;font-weight:600;color:var(--gold);letter-spacing:2px}
.store-sel{background:var(--dark3);border:1px solid var(--bdr);color:var(--tp);padding:5px 9px;border-radius:var(--r);font-size:12px;max-width:130px}
.store-sel option{background:var(--dark3)}
.role-badge{padding:2px 9px;border-radius:4px;font-size:11px;font-weight:600}
.rb-dev{background:#1A1035;color:#9A7AE0}
.rb-admin{background:#1A2D1A;color:#4AB87A}
.rb-staff{background:#2D2010;color:#C8922A}
.ml-auto{margin-left:auto}
.nav{background:var(--dark2);border-bottom:1px solid var(--bdr);display:flex;overflow-x:auto;flex-shrink:0;position:sticky;top:49px;z-index:9}
.nav::-webkit-scrollbar{height:3px}.nav::-webkit-scrollbar-track{background:var(--dark2)}.nav::-webkit-scrollbar-thumb{background:var(--bdr)}
.nb{padding:10px 15px;font-size:13px;color:var(--ts);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s}
.nb.active{color:var(--gold);border-bottom-color:var(--gold)}
.nb:hover:not(.active){color:var(--tp)}
.content{flex:1;padding:16px;max-width:700px;margin:0 auto;width:100%}
.page{display:none}.page.active{display:block}
.inp{width:100%;background:var(--dark3);border:1px solid var(--bdr);color:var(--tp);padding:9px 11px;border-radius:var(--r);font-size:14px;margin-bottom:9px}
.inp:focus{outline:none;border-color:var(--gold)}
.inp::placeholder{color:var(--tm)}
select.inp option{background:var(--dark3);color:var(--tp)}
.lbl{font-size:12px;color:var(--ts);margin-bottom:4px;display:block}
.btn{padding:8px 14px;border-radius:var(--r);border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.btn-g{background:var(--gold);color:#1A1A1A}.btn-g:hover{background:var(--gold-l)}
.btn-o{background:none;border:1px solid var(--bdr);color:var(--ts)}.btn-o:hover{border-color:var(--gold);color:var(--gold)}
.btn-d{background:none;border:1px solid #7a2020;color:#c06060}.btn-d:hover{background:#7a2020;color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-w{width:100%;padding:11px;font-size:15px;margin-top:6px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.metric{background:var(--dark3);border-radius:var(--r);padding:12px;text-align:center}
.mv{font-size:22px;font-weight:600;color:var(--gold)}
.ml{font-size:11px;color:var(--tm);margin-top:3px}
.bk-item{background:var(--dark3);border-radius:var(--r);padding:10px 13px;margin-bottom:8px;border-left:3px solid var(--gold)}
.bk-item.done{border-left-color:#5A90D8;opacity:.65}
.bk-item.cancel{border-left-color:#C85A5A;opacity:.55}
.bk-name{font-size:14px;font-weight:500;margin-bottom:4px}
.bk-meta{font-size:12px;color:var(--ts);display:flex;flex-wrap:wrap;gap:6px}
.menu-item{background:var(--dark3);border-radius:var(--r);padding:10px 13px;margin-bottom:8px}
.st-item{background:var(--dark3);border-radius:var(--r);padding:10px 13px;margin-bottom:8px;display:flex;align-items:center;gap:11px}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--dark4);border:1px solid var(--gold-d);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:var(--gold);flex-shrink:0}
.acc-item{background:var(--dark3);border-radius:var(--r);padding:10px 13px;margin-bottom:8px;display:flex;align-items:center;gap:9px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.t-wait{background:#3A2A10;color:#C8922A}
.t-conf{background:#0F2D1F;color:#2DB87A}
.t-done{background:#1A2030;color:#5A90D8}
.t-canc{background:#2D1010;color:#C85A5A}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--dark2);border:1px solid var(--bdr);border-radius:12px;padding:20px;width:100%;max-width:400px;max-height:88vh;overflow-y:auto}
.mt{font-size:15px;font-weight:600;color:var(--gold);margin-bottom:14px}
.hidden{display:none!important}
.row{display:flex;align-items:center;gap:8px}
.rb{display:flex;align-items:center;justify-content:space-between;gap:8px}
.sec{font-size:13px;font-weight:500;color:var(--gold);margin-bottom:10px;letter-spacing:.4px}
.divider{border:none;border-top:1px solid var(--bdr);margin:12px 0}
.tgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
.ts{background:var(--dark3);border:1px solid var(--bdr);border-radius:5px;padding:6px;text-align:center;font-size:12px;cursor:pointer;color:var(--ts);transition:all .1s}
.ts.taken{opacity:.3;pointer-events:none;text-decoration:line-through}
.ts.sel{border-color:var(--gold);color:var(--gold);background:#2A2010}
.ts:hover:not(.taken):not(.sel){border-color:var(--tm);color:var(--tp)}
.pills{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.pill{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--bdr);color:var(--ts);background:none;transition:all .1s}
.pill.active{background:var(--gold);color:#1A1A1A;border-color:var(--gold)}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-lbl{font-size:11px;color:var(--ts);width:68px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:10px;background:var(--dark4);border-radius:5px;overflow:hidden}
.bar-fill{height:100%;background:var(--gold);border-radius:5px;transition:width .4s}
.bar-val{font-size:11px;color:var(--tp);width:58px;text-align:right;flex-shrink:0}
.badge{background:var(--gold);color:#1A1A1A;border-radius:10px;padding:1px 6px;font-size:11px;font-weight:600;margin-left:4px}
.checkin-btn{background:#0F2D1F;border:1px solid #1A4A30;color:#2DB87A;padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;transition:background .1s}
.checkin-btn:hover{background:#1A4A30}
.checkin-btn.done{background:#1A2030;border-color:#2A3A50;color:#5A90D8;cursor:default;pointer-events:none}
.lock-note{font-size:11px;color:var(--tm);padding:3px 8px;border:1px solid var(--bdr);border-radius:5px}
.card{background:var(--dark3);border-radius:var(--r);padding:12px;margin-bottom:12px}
@media(max-width:480px){.g2{grid-template-columns:1fr 1fr}.tgrid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<div class="app" id="app">

<!-- LOGIN -->
<div id="screen-login" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">LUXE ESTHE</div>
    <div class="login-sub">スタッフログイン</div>
    <label class="lbl">ユーザー名</label>
    <input class="inp" id="l-user" placeholder="username" autocomplete="off">
    <label class="lbl">パスワード</label>
    <input class="inp" type="password" id="l-pass" placeholder="password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-g btn-w" onclick="doLogin()">ログイン</button>
    <div id="l-err" style="color:#c06060;font-size:13px;margin-top:10px;text-align:center"></div>
  </div>
</div>

<!-- MAIN -->
<div id="screen-main" class="hidden" style="display:flex;flex-direction:column;flex:1">
  <div class="topbar">
    <span class="logo">LUXE ESTHE</span>
    <select class="store-sel" id="storeSel" onchange="changeStore()">
      <option value="0">渋谷店</option>
      <option value="1">新宿店</option>
      <option value="2">銀座店</option>
    </select>
    <span class="role-badge" id="roleBadge"></span>
    <span style="font-size:12px;color:var(--ts)" id="userLabel"></span>
    <div class="ml-auto row" style="gap:7px">
      <button class="btn btn-g btn-sm" onclick="openM('newBk')">＋ 予約</button>
      <button class="btn btn-o btn-sm" onclick="doLogout()">ログアウト</button>
    </div>
  </div>
  <div class="nav">
    <button class="nb active" onclick="showPage('dash',this)">ダッシュボード</button>
    <button class="nb" onclick="showPage('bk',this)">予約<span class="badge" id="bkBadge">0</span></button>
    <button class="nb" onclick="showPage('menu',this)">メニュー</button>
    <button class="nb" onclick="showPage('staff',this)">スタッフ</button>
    <button class="nb" id="nav-sales" onclick="showPage('sales',this)">売上</button>
    <button class="nb" id="nav-accounts" onclick="showPage('accounts',this)">アカウント</button>
  </div>
  <div class="content">

    <!-- DASHBOARD -->
    <div class="page active" id="page-dash">
      <div class="sec" id="dashDate"></div>
      <div class="g2">
        <div class="metric"><div class="mv" id="d-today">0</div><div class="ml">本日の予約</div></div>
        <div class="metric"><div class="mv" id="d-ci">0</div><div class="ml">来店済み</div></div>
        <div class="metric" id="d-sales-box"><div class="mv" id="d-sales">¥0</div><div class="ml">本日売上</div></div>
        <div class="metric"><div class="mv" id="d-wait">0</div><div class="ml">待機中</div></div>
      </div>
      <div class="sec">本日のスケジュール</div>
      <div id="dashList"></div>
    </div>

    <!-- BOOKINGS -->
    <div class="page hidden" id="page-bk">
      <div class="pills">
        <button class="pill active" onclick="fBk('all',this)">すべて</button>
        <button class="pill" onclick="fBk('waiting',this)">待機</button>
        <button class="pill" onclick="fBk('confirmed',this)">確定</button>
        <button class="pill" onclick="fBk('done',this)">完了</button>
        <button class="pill" onclick="fBk('cancel',this)">キャンセル</button>
      </div>
      <div id="bkList"></div>
    </div>

    <!-- MENU -->
    <div class="page hidden" id="page-menu">
      <div class="rb" style="margin-bottom:12px">
        <span class="sec" style="margin:0">メニュー・料金</span>
        <button class="btn btn-g btn-sm" id="addMenuBtn" onclick="openM('newMenu')">＋ 追加</button>
      </div>
      <div id="menuList"></div>
    </div>

    <!-- STAFF -->
    <div class="page hidden" id="page-staff">
      <div class="rb" style="margin-bottom:12px">
        <span class="sec" style="margin:0">スタッフ一覧</span>
        <button class="btn btn-g btn-sm" id="addStaffBtn" onclick="openM('newStaff')">＋ 追加</button>
      </div>
      <div id="staffList"></div>
    </div>

    <!-- SALES -->
    <div class="page hidden" id="page-sales">
      <div class="pills">
        <button class="pill active" onclick="sPeriod('week',this)">今週</button>
        <button class="pill" onclick="sPeriod('month',this)">今月</button>
      </div>
      <div class="g2" style="margin-bottom:14px">
        <div class="metric"><div class="mv" id="s-total">¥0</div><div class="ml">売上合計</div></div>
        <div class="metric"><div class="mv" id="s-cnt">0</div><div class="ml">来店数</div></div>
      </div>
      <div class="sec">メニュー別売上</div>
      <div class="card" id="menuChart"></div>
      <div class="sec">スタッフ別指名</div>
      <div class="card" id="staffChart"></div>
    </div>

    <!-- ACCOUNTS -->
    <div class="page hidden" id="page-accounts">
      <div class="rb" style="margin-bottom:12px">
        <span class="sec" style="margin:0">アカウント管理</span>
        <button class="btn btn-g btn-sm" id="addAccBtn" onclick="openM('newAcc')">＋ 追加</button>
      </div>
      <div id="accList"></div>
    </div>

  </div>
</div>

<!-- MODALS -->
<div class="ov hidden" id="ov" onclick="closeOv(event)">

  <div class="modal hidden" id="m-newBk">
    <div class="mt">予約追加</div>
    <label class="lbl">お客様名</label>
    <input class="inp" id="nb-cname" placeholder="山田 太郎">
    <label class="lbl">メニュー</label>
    <select class="inp" id="nb-menu"></select>
    <label class="lbl">スタッフ指名</label>
    <select class="inp" id="nb-staff"></select>
    <label class="lbl">日付</label>
    <input type="date" class="inp" id="nb-date" onchange="refreshTG()">
    <label class="lbl">時間</label>
    <div class="tgrid" id="tgrid"></div>
    <label class="lbl">備考</label>
    <input class="inp" id="nb-note" placeholder="アレルギー・要望等">
    <div class="row" style="justify-content:flex-end;gap:8px;margin-top:8px">
      <button class="btn btn-o" onclick="closeM()">キャンセル</button>
      <button class="btn btn-g" onclick="addBk()">予約確定</button>
    </div>
  </div>

  <div class="modal hidden" id="m-editBk">
    <div class="mt">予約編集</div>
    <input type="hidden" id="eb-id">
    <label class="lbl">お客様名</label>
    <input class="inp" id="eb-cname">
    <label class="lbl">メニュー</label>
    <select class="inp" id="eb-menu"></select>
    <label class="lbl">スタッフ指名</label>
    <select class="inp" id="eb-staff"></select>
    <label class="lbl">日付</label>
    <input type="date" class="inp" id="eb-date" onchange="refreshEditTG()">
    <label class="lbl">時間</label>
    <div class="tgrid" id="etgrid"></div>
    <label class="lbl">備考</label>
    <input class="inp" id="eb-note">
    <div class="row" style="justify-content:flex-end;gap:8px;margin-top:8px">
      <button class="btn btn-o" onclick="closeM()">キャンセル</button>
      <button class="btn btn-g" onclick="saveEditBk()">保存</button>
    </div>
  </div>

  <div class="modal hidden" id="m-newMenu">
    <div class="mt" id="menuModalTitle">メニュー追加</div>
    <input type="hidden" id="mm-idx">
    <label class="lbl">メニュー名</label>
    <input class="inp" id="mm-name" placeholder="全身オイルマッサージ">
    <label class="lbl">時間（分）</label>
    <input type="number" class="inp" id="mm-time" placeholder="60">
    <label class="lbl">料金（円）</label>
    <input type="number" class="inp" id="mm-price" placeholder="15000">
    <div class="row" style="justify-content:flex-end;gap:8px;margin-top:8px">
      <button class="btn btn-o" onclick="closeM()">キャンセル</button>
      <button class="btn btn-g" onclick="saveMenu()">保存</button>
    </div>
  </div>

  <div class="modal hidden" id="m-newStaff">
    <div class="mt">スタッフ追加</div>
    <label class="lbl">氏名</label>
    <input class="inp" id="ns-name" placeholder="田中 花子">
    <label class="lbl">ポジション</label>
    <input class="inp" id="ns-pos" placeholder="セラピスト">
    <div class="row" style="justify-content:flex-end;gap:8px;margin-top:8px">
      <button class="btn btn-o" onclick="closeM()">キャンセル</button>
      <button class="btn btn-g" onclick="addStaff()">追加</button>
    </div>
  </div>

  <div class="modal hidden" id="m-newAcc">
    <div class="mt">アカウント追加</div>
    <label class="lbl">ユーザー名</label>
    <input class="inp" id="na-user" placeholder="tanaka_mai" autocomplete="off">
    <label class="lbl">パスワード</label>
    <input type="password" class="inp" id="na-pass" placeholder="••••••••">
    <label class="lbl">ロール</label>
    <select class="inp" id="na-role">
      <option value="admin">管理者</option>
      <option value="staff">スタッフ</option>
    </select>
    <label class="lbl">表示名</label>
    <input class="inp" id="na-display" placeholder="田中 麻衣">
    <div class="row" style="justify-content:flex-end;gap:8px;margin-top:8px">
      <button class="btn btn-o" onclick="closeM()">キャンセル</button>
      <button class="btn btn-g" onclick="addAcc()">追加</button>
    </div>
  </div>

  <div class="modal hidden" id="m-chgPass">
    <div class="mt">パスワード変更</div>
    <input type="hidden" id="cp-uid">
    <div id="cp-curr-wrap">
      <label class="lbl">現在のパスワード</label>
      <input type="password" class="inp" id="cp-curr" placeholder="••••••••">
    </div>
    <label class="lbl">新しいパスワード</label>
    <input type="password" class="inp" id="cp-new" placeholder="••••••••">
    <label class="lbl">確認</label>
    <input type="password" class="inp" id="cp-new2" placeholder="••••••••">
    <div id="cp-err" style="color:#c06060;font-size:12px;margin-bottom:6px"></div>
    <div class="row" style="justify-content:flex-end;gap:8px">
      <button class="btn btn-o" onclick="closeM()">キャンセル</button>
      <button class="btn btn-g" onclick="savePass()">変更</button>
    </div>
  </div>

</div>

<script>
const SI=()=>parseInt(document.getElementById('storeSel')?.value||0);
const sk=k=>`luxe_${SI()}_${k}`;
const ld=(k,d)=>{try{const v=localStorage.getItem(sk(k));return v?JSON.parse(v):d}catch{return d}};
const sv=(k,v)=>{try{localStorage.setItem(sk(k),JSON.stringify(v))}catch{}};
const gsk=k=>`luxe_global_${k}`;
const gld=(k,d)=>{try{const v=localStorage.getItem(gsk(k));return v?JSON.parse(v):d}catch{return d}};
const gsv=(k,v)=>{try{localStorage.setItem(gsk(k),JSON.stringify(v))}catch{}};

let CUR=null;

function initAccounts(){
  if(gld('accInit',false))return;
  gsv('accounts',[
    {id:'dev',username:'developer',password:'dev2024',role:'dev',display:'製作者'},
    {id:'adm1',username:'admin',password:'admin123',role:'admin',display:'管理者'},
    {id:'stf1',username:'tanaka',password:'staff1',role:'staff',display:'田中 彩'},
    {id:'stf2',username:'tamura',password:'staff2',role:'staff',display:'田村 麻衣'},
  ]);
  gsv('accInit',true);
}

function initStore(){
  if(ld('init',false))return;
  sv('staff',[
    {id:1,name:'田中 彩',pos:'セラピスト',nominations:24},
    {id:2,name:'田村 麻衣',pos:'セラピスト',nominations:18},
    {id:3,name:'中村 葵',pos:'セラピスト',nominations:31},
  ]);
  sv('menus',[
    {id:1,name:'全身オイルマッサージ',time:60,price:15000},
    {id:2,name:'ヘッドスパコース',time:45,price:9000},
    {id:3,name:'プレミアムフルコース',time:90,price:25000},
    {id:4,name:'フェイシャルケア',time:30,price:8000},
  ]);
  const today=getToday();
  sv('bookings',[
    {id:1,cname:'田中 誠',date:today,time:'13:00',menuId:1,staffId:3,note:'',status:'confirmed',checkin:true,createdBy:'adm1'},
    {id:2,cname:'佐藤 健',date:today,time:'14:30',menuId:2,staffId:1,note:'',status:'waiting',checkin:false,createdBy:'adm1'},
    {id:3,cname:'鈴木 俊介',date:today,time:'16:00',menuId:3,staffId:2,note:'肩重点',status:'waiting',checkin:false,createdBy:'stf1'},
  ]);
  sv('nid',{b:100,s:10,m:10});
  sv('init',true);
}

function nid(t){const ids=ld('nid',{b:100,s:10,m:10});const id=(ids[t]||100)+1;ids[t]=id;sv('nid',ids);return id;}
function getToday(){return new Date().toISOString().slice(0,10);}
function fp(n){return '¥'+Number(n).toLocaleString();}
function mName(id){return ld('menus',[]).find(x=>x.id===id)?.name||'不明';}
function mPrice(id){return ld('menus',[]).find(x=>x.id===id)?.price||0;}
function sName(id){if(!id)return '指名なし';return ld('staff',[]).find(x=>x.id===id)?.name||'不明';}
function stTag(s){
  const m={waiting:['t-wait','待機中'],confirmed:['t-conf','確定'],done:['t-done','完了'],cancel:['t-canc','キャンセル']};
  const[cls,lbl]=m[s]||['',''];return `<span class="tag ${cls}">${lbl}</span>`;
}

function doLogin(){
  const u=document.getElementById('l-user').value.trim();
  const p=document.getElementById('l-pass').value;
  const acc=gld('accounts',[]).find(a=>a.username===u&&a.password===p);
  if(!acc){document.getElementById('l-err').textContent='ユーザー名またはパスワードが違います';return;}
  CUR=acc;
  document.getElementById('screen-login').classList.add('hidden');
  const sm=document.getElementById('screen-main');
  sm.classList.remove('hidden');sm.style.display='flex';
  applyRole();initStore();renderAll();
}

function doLogout(){
  CUR=null;
  document.getElementById('screen-main').classList.add('hidden');
  document.getElementById('screen-main').style.display='none';
  document.getElementById('screen-login').classList.remove('hidden');
  ['l-user','l-pass'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('l-err').textContent='';
}

function applyRole(){
  const r=CUR.role;
  const rb=document.getElementById('roleBadge');
  rb.className='role-badge '+(r==='dev'?'rb-dev':r==='admin'?'rb-admin':'rb-staff');
  rb.textContent=r==='dev'?'製作者':r==='admin'?'管理者':'スタッフ';
  document.getElementById('userLabel').textContent=CUR.display;
  document.getElementById('nav-sales').classList.toggle('hidden',r==='staff');
  document.getElementById('nav-accounts').classList.toggle('hidden',r==='staff');
  document.getElementById('addMenuBtn').style.display=r==='staff'?'none':'';
  document.getElementById('addStaffBtn').style.display=r==='staff'?'none':'';
  document.getElementById('storeSel').disabled=r==='staff';
  document.getElementById('d-sales-box').style.display=r==='staff'?'none':'';
}

const canEdit=()=>CUR&&(CUR.role==='dev'||CUR.role==='admin');
const isStaff=()=>CUR&&CUR.role==='staff';
const isDev=()=>CUR&&CUR.role==='dev';

function canEditBk(bk){
  if(!CUR)return false;
  if(CUR.role==='dev'||CUR.role==='admin')return bk.status!=='done'&&bk.status!=='cancel';
  if(bk.createdBy!==CUR.id)return false;
  if(bk.date!==getToday())return false;
  const now=new Date();
  const[hh,mm]=bk.time.split(':').map(Number);
  const bt=new Date();bt.setHours(hh,mm,0,0);
  return now<bt&&bk.status!=='done'&&bk.status!=='cancel';
}

function renderAll(){renderDash();renderBk();renderMenu();renderStaff();renderSales();renderAccounts();updateBadge();}

function updateBadge(){
  const n=ld('bookings',[]).filter(b=>b.date===getToday()&&b.status==='waiting').length;
  document.getElementById('bkBadge').textContent=n;
}

function renderDash(){
  const today=getToday();
  const d=new Date();
  document.getElementById('dashDate').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${'日月火水木金土'[d.getDay()]}）`;
  const bks=ld('bookings',[]).filter(b=>b.date===today);
  const done=bks.filter(b=>b.checkin);
  document.getElementById('d-today').textContent=bks.length;
  document.getElementById('d-ci').textContent=done.length;
  document.getElementById('d-sales').textContent=fp(done.reduce((s,b)=>s+mPrice(b.menuId),0));
  document.getElementById('d-wait').textContent=bks.filter(b=>b.status==='waiting'||b.status==='confirmed').length;
  const sorted=[...bks].sort((a,b)=>a.time.localeCompare(b.time));
  document.getElementById('dashList').innerHTML=sorted.length?sorted.map(bk=>bkHTML(bk,true)).join('')
    :'<div style="color:var(--tm);font-size:13px;padding:10px 0">本日の予約はありません</div>';
}

let bkFilter='all';
function fBk(f,el){bkFilter=f;document.querySelectorAll('#page-bk .pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');renderBk();}
function renderBk(){
  let bks=ld('bookings',[]);
  if(isStaff()) bks=bks.filter(b=>b.date===getToday());
  if(bkFilter!=='all') bks=bks.filter(b=>b.status===bkFilter);
  bks.sort((a,b)=>b.date.localeCompare(a.date)||a.time.localeCompare(b.time));
  document.getElementById('bkList').innerHTML=bks.length?bks.map(bk=>bkHTML(bk,false)).join('')
    :'<div style="color:var(--tm);font-size:13px;padding:10px 0">該当する予約はありません</div>';
}

function bkHTML(bk,isDash){
  const editable=canEditBk(bk);
  const locked=isStaff()&&!editable&&bk.createdBy===CUR.id;
  const cls='bk-item'+(bk.status==='done'?' done':bk.status==='cancel'?' cancel':'');
  const actions=[];
  if(editable&&!isDash){
    actions.push(`<button class="btn btn-o btn-sm" onclick="openEditBk(${bk.id})">編集</button>`);
    if(bk.status!=='done') actions.push(`<button class="btn btn-o btn-sm" onclick="completeBk(${bk.id})">完了</button>`);
    if(bk.status!=='cancel') actions.push(`<button class="btn btn-d btn-sm" onclick="cancelBk(${bk.id})">✕</button>`);
  }
  const ciBtn=canEdit()&&bk.status!=='cancel'?`<button class="${bk.checkin?'checkin-btn done':'checkin-btn'}" onclick="toggleCI(${bk.id})">${bk.checkin?'来店済':'来店確認'}</button>`:'';
  const lockNote=locked?'<span class="lock-note">🔒 編集不可</span>':'';
  return `<div class="${cls}">
    <div class="rb" style="flex-wrap:wrap;gap:5px">
      <span class="bk-name">${bk.cname}</span>
      <div class="row" style="gap:5px;flex-wrap:wrap">${stTag(bk.status)}${ciBtn}${lockNote}${actions.join('')}</div>
    </div>
    <div class="bk-meta"><span>${bk.date}</span><span>${bk.time}</span><span>${mName(bk.menuId)} ${fp(mPrice(bk.menuId))}</span><span>${sName(bk.staffId)}</span>${bk.note?`<span>${bk.note}</span>`:''}</div>
  </div>`;
}

function toggleCI(id){
  if(!canEdit())return;
  const bks=ld('bookings',[]);const b=bks.find(x=>x.id===id);
  if(b){b.checkin=!b.checkin;if(b.checkin&&b.status==='waiting')b.status='confirmed';sv('bookings',bks);renderAll();}
}
function completeBk(id){
  const bks=ld('bookings',[]);const b=bks.find(x=>x.id===id);
  if(b){b.status='done';b.checkin=true;sv('bookings',bks);renderAll();}
}
function cancelBk(id){
  if(!confirm('キャンセルしますか？'))return;
  const bks=ld('bookings',[]);const b=bks.find(x=>x.id===id);
  if(b){b.status='cancel';sv('bookings',bks);renderAll();}
}

const TIMES=['10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30','19:00','19:30'];
function buildTG(date,excludeId,cid){
  const bks=ld('bookings',[]).filter(b=>b.date===date&&b.status!=='cancel'&&b.id!==excludeId);
  const taken=new Set(bks.map(b=>b.time));
  document.getElementById(cid).innerHTML=TIMES.map(t=>`<div class="ts${taken.has(t)?' taken':''}" data-time="${t}" onclick="selT(this,'${cid}')">${t}</div>`).join('');
}
function selT(el,cid){document.querySelectorAll(`#${cid} .ts`).forEach(s=>s.classList.remove('sel'));el.classList.add('sel');}
function refreshTG(){buildTG(document.getElementById('nb-date').value,null,'tgrid');}
function refreshEditTG(){buildTG(document.getElementById('eb-date').value,parseInt(document.getElementById('eb-id').value),'etgrid');}
function getSelTime(cid){return document.querySelector(`#${cid} .ts.sel`)?.dataset.time||'';}

function addBk(){
  const cname=document.getElementById('nb-cname').value.trim();
  const date=document.getElementById('nb-date').value;
  const time=getSelTime('tgrid');
  const menuId=parseInt(document.getElementById('nb-menu').value);
  const staffId=parseInt(document.getElementById('nb-staff').value)||0;
  const note=document.getElementById('nb-note').value;
  if(!cname||!date||!time||!menuId){alert('お客様名・日付・時間・メニューを入力してください');return;}
  const bks=ld('bookings',[]);
  bks.push({id:nid('b'),cname,date,time,menuId,staffId,note,status:'waiting',checkin:false,createdBy:CUR.id});
  sv('bookings',bks);closeM();renderAll();
}

function openEditBk(id){
  const bk=ld('bookings',[]).find(x=>x.id===id);
  if(!bk||!canEditBk(bk))return;
  document.getElementById('eb-id').value=id;
  document.getElementById('eb-cname').value=bk.cname;
  document.getElementById('eb-note').value=bk.note||'';
  document.getElementById('eb-date').value=bk.date;
  const ms=document.getElementById('eb-menu');
  ms.innerHTML='<option value="">--</option>'+ld('menus',[]).map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
  ms.value=bk.menuId;
  const ss=document.getElementById('eb-staff');
  ss.innerHTML='<option value="">指名なし</option>'+ld('staff',[]).map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  ss.value=bk.staffId||'';
  openM('editBk');
  buildTG(bk.date,id,'etgrid');
  const cur=document.querySelector(`#etgrid .ts[data-time="${bk.time}"]`);
  if(cur)cur.classList.add('sel');
}

function saveEditBk(){
  const id=parseInt(document.getElementById('eb-id').value);
  const bks=ld('bookings',[]);const bk=bks.find(x=>x.id===id);
  if(!bk)return;
  bk.cname=document.getElementById('eb-cname').value.trim()||bk.cname;
  bk.date=document.getElementById('eb-date').value;
  bk.time=getSelTime('etgrid')||bk.time;
  bk.menuId=parseInt(document.getElementById('eb-menu').value)||bk.menuId;
  bk.staffId=parseInt(document.getElementById('eb-staff').value)||0;
  bk.note=document.getElementById('eb-note').value;
  sv('bookings',bks);closeM();renderAll();
}

function renderMenu(){
  document.getElementById('menuList').innerHTML=ld('menus',[]).map((m,i)=>`
    <div class="menu-item">
      <div class="rb">
        <div><div style="font-size:14px;font-weight:500">${m.name}</div>
        <div style="font-size:12px;color:var(--ts);margin-top:3px">${m.time}分 · ${fp(m.price)}</div></div>
        ${canEdit()?`<div class="row" style="gap:6px">
          <button class="btn btn-o btn-sm" onclick="openEditMenu(${i})">編集</button>
          <button class="btn btn-d btn-sm" onclick="deleteMenu(${i})">削除</button>
        </div>`:''}
      </div>
    </div>`).join('')||'<div style="color:var(--tm);font-size:13px">メニューなし</div>';
}
function openEditMenu(i){
  const m=ld('menus',[])[i];
  document.getElementById('menuModalTitle').textContent='メニュー編集';
  document.getElementById('mm-idx').value=i;
  document.getElementById('mm-name').value=m.name;
  document.getElementById('mm-time').value=m.time;
  document.getElementById('mm-price').value=m.price;
  openM('newMenu');
}
function saveMenu(){
  const i=document.getElementById('mm-idx').value;
  const name=document.getElementById('mm-name').value.trim();
  const time=parseInt(document.getElementById('mm-time').value);
  const price=parseInt(document.getElementById('mm-price').value);
  if(!name||!time||!price){alert('すべて入力してください');return;}
  const menus=ld('menus',[]);
  if(i===''){menus.push({id:nid('m'),name,time,price});}
  else{menus[parseInt(i)]={...menus[parseInt(i)],name,time,price};}
  sv('menus',menus);closeM();renderMenu();
}
function deleteMenu(i){
  if(!confirm('削除しますか？'))return;
  const m=ld('menus',[]);m.splice(i,1);sv('menus',m);renderMenu();
}

function renderStaff(){
  document.getElementById('staffList').innerHTML=ld('staff',[]).map(s=>`
    <div class="st-item">
      <div class="avatar">${s.name.charAt(0)}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:500">${s.name}</div>
      <div style="font-size:12px;color:var(--tm)">${s.pos} · 指名${s.nominations||0}回</div></div>
      ${canEdit()?`<button class="btn btn-d btn-sm" onclick="deleteStaff(${s.id})">削除</button>`:''}
    </div>`).join('')||'<div style="color:var(--tm);font-size:13px">スタッフなし</div>';
}
function addStaff(){
  const name=document.getElementById('ns-name').value.trim();
  const pos=document.getElementById('ns-pos').value.trim();
  if(!name){alert('氏名を入力してください');return;}
  const st=ld('staff',[]);st.push({id:nid('s'),name,pos,nominations:0});sv('staff',st);closeM();renderStaff();
}
function deleteStaff(id){
  if(!confirm('削除しますか？'))return;
  sv('staff',ld('staff',[]).filter(s=>s.id!==id));renderStaff();
}

let sPer='week';
function sPeriod(m,el){sPer=m;document.querySelectorAll('#page-sales .pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');renderSales();}
function renderSales(){
  const bks=ld('bookings',[]).filter(b=>b.status==='done'||b.checkin);
  const cut=new Date();
  if(sPer==='week') cut.setDate(cut.getDate()-7); else cut.setDate(1);
  const filtered=bks.filter(b=>b.date>=cut.toISOString().slice(0,10));
  document.getElementById('s-total').textContent=fp(filtered.reduce((s,b)=>s+mPrice(b.menuId),0));
  document.getElementById('s-cnt').textContent=filtered.length;
  const menus=ld('menus',[]);
  const maxM=Math.max(1,...menus.map(m=>filtered.filter(b=>b.menuId===m.id).length));
  document.getElementById('menuChart').innerHTML=menus.map(m=>{
    const n=filtered.filter(b=>b.menuId===m.id).length;
    return `<div class="bar-row"><span class="bar-lbl">${m.name.slice(0,7)}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxM*100)}%"></div></div><span class="bar-val">${fp(n*m.price)}</span></div>`;
  }).join('');
  const staff=ld('staff',[]);
  const maxS=Math.max(1,...staff.map(s=>filtered.filter(b=>b.staffId===s.id).length));
  document.getElementById('staffChart').innerHTML=staff.map(s=>{
    const n=filtered.filter(b=>b.staffId===s.id).length;
    return `<div class="bar-row"><span class="bar-lbl">${s.name.slice(0,5)}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxS*100)}%"></div></div><span class="bar-val">${n}件</span></div>`;
  }).join('');
}

function renderAccounts(){
  const accs=gld('accounts',[]);
  const rlbl={dev:'製作者',admin:'管理者',staff:'スタッフ'};
  const rcls={dev:'rb-dev',admin:'rb-admin',staff:'rb-staff'};
  const visible=isDev()?accs:accs.filter(a=>a.role!=='dev');
  document.getElementById('accList').innerHTML=visible.map(a=>`
    <div class="acc-item">
      <div class="avatar" style="font-size:12px">${a.display.charAt(0)}</div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:500">${a.display} <span class="role-badge ${rcls[a.role]||''}" style="font-size:10px;padding:1px 7px">${rlbl[a.role]||a.role}</span></div>
        <div style="font-size:12px;color:var(--tm)">@${a.username}</div>
      </div>
      <div class="row" style="gap:5px">
        ${canChangePass(a)?`<button class="btn btn-o btn-sm" onclick="openChgPass('${a.id}')">PW変更</button>`:''}
        ${canDeleteAcc(a)?`<button class="btn btn-d btn-sm" onclick="deleteAcc('${a.id}')">削除</button>`:''}
      </div>
    </div>`).join('')||'<div style="color:var(--tm);font-size:13px">アカウントなし</div>';
}
function canChangePass(a){
  if(!CUR)return false;
  if(a.role==='dev')return CUR.role==='dev'&&CUR.id===a.id;
  return CUR.role==='dev'||CUR.role==='admin'||CUR.id===a.id;
}
function canDeleteAcc(a){
  if(!CUR)return false;
  if(a.id===CUR.id||a.role==='dev')return false;
  return CUR.role==='dev'||(CUR.role==='admin'&&a.role!=='dev');
}
function addAcc(){
  const username=document.getElementById('na-user').value.trim();
  const password=document.getElementById('na-pass').value;
  const role=document.getElementById('na-role').value;
  const display=document.getElementById('na-display').value.trim();
  if(!username||!password||!display){alert('すべて入力してください');return;}
  const accs=gld('accounts',[]);
  if(accs.find(a=>a.username===username)){alert('このユーザー名は既に使用されています');return;}
  accs.push({id:'u'+Date.now(),username,password,role,display});
  gsv('accounts',accs);closeM();renderAccounts();
}
function deleteAcc(id){
  if(!confirm('削除しますか？'))return;
  gsv('accounts',gld('accounts',[]).filter(a=>a.id!==id));renderAccounts();
}
function openChgPass(uid){
  const a=gld('accounts',[]).find(x=>x.id===uid);if(!a)return;
  document.getElementById('cp-uid').value=uid;
  ['cp-curr','cp-new','cp-new2'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('cp-err').textContent='';
  const needCurr=a.role==='dev'||CUR.id===uid;
  document.getElementById('cp-curr-wrap').style.display=needCurr?'':'none';
  openM('chgPass');
}
function savePass(){
  const uid=document.getElementById('cp-uid').value;
  const cur=document.getElementById('cp-curr').value;
  const nw=document.getElementById('cp-new').value;
  const nw2=document.getElementById('cp-new2').value;
  const errEl=document.getElementById('cp-err');
  if(nw!==nw2){errEl.textContent='新しいパスワードが一致しません';return;}
  if(!nw){errEl.textContent='パスワードを入力してください';return;}
  const accs=gld('accounts',[]);
  const a=accs.find(x=>x.id===uid);if(!a)return;
  const needCurr=document.getElementById('cp-curr-wrap').style.display!=='none';
  if(needCurr&&a.password!==cur){errEl.textContent='現在のパスワードが違います';return;}
  a.password=nw;gsv('accounts',accs);
  if(CUR.id===uid)CUR.password=nw;
  closeM();alert('パスワードを変更しました');
}

function openM(name){
  document.getElementById('ov').classList.remove('hidden');
  document.querySelectorAll('.modal').forEach(m=>m.classList.add('hidden'));
  document.getElementById('m-'+name).classList.remove('hidden');
  if(name==='newBk'){
    const ms=document.getElementById('nb-menu');
    ms.innerHTML='<option value="">-- 選択 --</option>'+ld('menus',[]).map(m=>`<option value="${m.id}">${m.name} (${fp(m.price)})</option>`).join('');
    const ss=document.getElementById('nb-staff');
    ss.innerHTML='<option value="">指名なし</option>'+ld('staff',[]).map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
    document.getElementById('nb-date').value=getToday();
    document.getElementById('nb-cname').value='';
    document.getElementById('nb-note').value='';
    buildTG(getToday(),null,'tgrid');
  }
  if(name==='newMenu'){
    document.getElementById('menuModalTitle').textContent='メニュー追加';
    document.getElementById('mm-idx').value='';
    ['mm-name','mm-time','mm-price'].forEach(i=>document.getElementById(i).value='');
  }
  if(name==='newStaff'){
    ['ns-name','ns-pos'].forEach(i=>document.getElementById(i).value='');
  }
  if(name==='newAcc'){
    ['na-user','na-pass','na-display'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('na-role').value='staff';
  }
}
function closeM(){
  document.getElementById('ov').classList.add('hidden');
  document.querySelectorAll('.modal').forEach(m=>m.classList.add('hidden'));
}
function closeOv(e){if(e.target.id==='ov')closeM();}

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>{p.classList.add('hidden');p.classList.remove('active')});
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  const p=document.getElementById('page-'+name);
  if(p){p.classList.remove('hidden');p.classList.add('active');}
  if(btn)btn.classList.add('active');
  if(name==='sales')renderSales();
  if(name==='accounts')renderAccounts();
}

function changeStore(){initStore();renderAll();}

initAccounts();
</script>
