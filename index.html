<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE ESTHE - 管理システム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#B8964A;--gold-l:#D4AF6A;--gold-d:#8A6E2F;
  --dark:#1A1A1A;--dark2:#222222;--dark3:#2A2A2A;--dark4:#333333;
  --tp:#F0E8D0;--ts:#A0927A;--tm:#6A5E50;--bdr:#3A3330;--r:8px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--dark);color:var(--tp)}
.app{min-height:100vh;display:flex;flex-direction:column}

/* LOGIN */
.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;min-height:100vh}
.login-box{background:var(--dark2);border:1px solid var(--bdr);border-radius:12px;padding:32px 28px;width:100%;max-width:360px}
.login-logo{text-align:center;font-size:22px;font-weight:600;color:var(--gold);letter-spacing:3px;margin-bottom:6px}
.login-sub{text-align:center;font-size:13px;color:var(--tm);margin-bottom:24px}

/* TOPBAR */
.topbar{background:var(--dark2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;padding:10px 16px;flex-shrink:0;position:sticky;top:0;z-index:10}
.logo{font-size:15px;font-weight:600;color:var(--gold);letter-spacing:2px}
.role-badge{padding:2px 9px;border-radius:4px;font-size:11px;font-weight:600}
.rb-dev{background:#1A1035;color:#9A7AE0}
.rb-admin{background:#1A2D1A;color:#4AB87A}
.ml-auto{margin-left:auto}

/* NAV */
.nav{background:var(--dark2);border-bottom:1px solid var(--bdr);display:flex;overflow-x:auto;flex-shrink:0;position:sticky;top:49px;z-index:9}
.nav::-webkit-scrollbar{height:3px}.nav::-webkit-scrollbar-thumb{background:var(--bdr)}
.nb{padding:10px 16px;font-size:13px;color:var(--ts);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s}
.nb.active{color:var(--gold);border-bottom-color:var(--gold)}
.nb:hover:not(.active){color:var(--tp)}

/* CONTENT */
.content{flex:1;padding:16px;max-width:700px;margin:0 auto;width:100%}
.page{display:none}.page.active{display:block}

/* FORMS */
.inp{width:100%;background:var(--dark3);border:1px solid var(--bdr);color:var(--tp);padding:9px 11px;border-radius:var(--r);font-size:14px;margin-bottom:9px}
.inp:focus{outline:none;border-color:var(--gold)}
.inp::placeholder{color:var(--tm)}
select.inp option{background:var(--dark3);color:var(--tp)}
.inp-sm{background:var(--dark3);border:1px solid var(--bdr);color:var(--tp);padding:7px 10px;border-radius:var(--r);font-size:13px}
.inp-sm:focus{outline:none;border-color:var(--gold)}
.inp-sm::placeholder{color:var(--tm)}
.lbl{font-size:12px;color:var(--ts);margin-bottom:4px;display:block}

/* BUTTONS */
.btn{padding:8px 14px;border-radius:var(--r);border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.btn-g{background:var(--gold);color:#1A1A1A}.btn-g:hover{background:var(--gold-l)}
.btn-o{background:none;border:1px solid var(--bdr);color:var(--ts)}.btn-o:hover{border-color:var(--gold);color:var(--gold)}
.btn-d{background:none;border:1px solid #7a2020;color:#c06060}.btn-d:hover{background:#7a2020;color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-w{width:100%;padding:11px;font-size:15px;margin-top:6px}

/* LAYOUT */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row{display:flex;align-items:center;gap:8px}
.rb{display:flex;align-items:center;justify-content:space-between;gap:8px}
.sec{font-size:13px;font-weight:500;color:var(--gold);margin-bottom:10px;letter-spacing:.5px}
.divider{border:none;border-top:1px solid var(--bdr);margin:12px 0}

/* SHORTEST PANEL */
.sp-panel{background:var(--dark2);border:1px solid var(--gold-d);border-radius:var(--r);padding:14px;margin-bottom:16px}
.sp-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.sp-title{font-size:13px;font-weight:600;color:var(--gold);letter-spacing:.5px}
.sp-tinp{background:var(--dark3);border:1px solid var(--bdr);color:var(--tp);padding:6px 9px;border-radius:var(--r);font-size:14px;width:76px;text-align:center}
.sp-tinp:focus{outline:none;border-color:var(--gold)}
.sp-btn{background:var(--dark3);border:1px solid var(--bdr);color:var(--ts);padding:6px 11px;border-radius:var(--r);font-size:12px;cursor:pointer;transition:all .15s}
.sp-btn:hover{border-color:var(--ts);color:var(--tp)}
.sp-btn-gold{background:var(--dark3);border:1px solid var(--gold-d);color:var(--gold);padding:6px 12px;border-radius:var(--r);font-size:12px;cursor:pointer;transition:all .15s}
.sp-btn-gold:hover{background:#2A2010}
.sp-tbl{width:100%;border-collapse:collapse;font-size:13px}
.sp-tbl th{color:var(--tm);font-weight:500;font-size:11px;padding:5px 8px;border-bottom:1px solid var(--bdr);text-align:center}
.sp-tbl th:first-child{text-align:left}
.sp-tbl td{padding:8px;border-bottom:1px solid #262626;text-align:center}
.sp-tbl tr:last-child td{border-bottom:none}
.sp-nm{text-align:left!important;color:var(--tp);font-weight:500}
.sp-st{color:var(--gold-l);font-weight:600}
.sp-mx{color:var(--ts);font-size:12px}
.sp-closed td{opacity:.4}
.sp-empty{color:var(--tm);font-size:12px;padding:10px 0;text-align:center}
.sp-sns-wrap{margin-top:12px;border-top:1px solid var(--bdr);padding-top:10px}
.sp-sns-lbl{font-size:11px;color:var(--tm);margin-bottom:5px}
.sp-sns{background:var(--dark3);border:1px solid var(--bdr);border-radius:var(--r);padding:9px 11px;font-size:13px;color:var(--ts);white-space:pre-wrap;line-height:1.9;min-height:40px}
.sp-copy{background:var(--dark3);border:1px solid var(--bdr);color:var(--ts);padding:5px 12px;border-radius:var(--r);font-size:12px;cursor:pointer;margin-top:7px;display:block;width:100%;text-align:center;transition:all .15s}
.sp-copy:hover{border-color:var(--gold);color:var(--gold)}

/* THERAPIST */
.th-item{background:var(--dark2);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.th-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--dark4);border:1px solid var(--gold-d);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:var(--gold);flex-shrink:0}
.th-name{font-size:15px;font-weight:600}
.th-sub{font-size:12px;color:var(--tm);margin-top:2px}
.prof-wrap{display:flex;flex-wrap:wrap;gap:5px}
.prof-tag{background:var(--dark3);border:1px solid var(--bdr);border-radius:4px;padding:3px 9px;font-size:11px;color:var(--ts)}
.prof-tag b{color:var(--tp);font-weight:500}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.t-att{background:#1A1535;color:#9A7AE0}

/* ATTENDANCE ROWS */
.att-row{background:var(--dark3);border-radius:6px;padding:9px 12px;margin-bottom:7px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.att-nm{font-size:13px;font-weight:500;min-width:80px;color:var(--tp)}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--dark2);border:1px solid var(--bdr);border-radius:12px;padding:20px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.mt{font-size:15px;font-weight:600;color:var(--gold);margin-bottom:14px}
.hidden{display:none!important}
.badge{background:var(--gold);color:#1A1A1A;border-radius:10px;padding:1px 6px;font-size:11px;font-weight:600;margin-left:4px}
</style>
</head>
<body>
<div class="app">

<!-- LOGIN -->
<div id="screen-login" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">LUXE ESTHE</div>
    <div class="login-sub">管理システム</div>
    <label class="lbl">ユーザー名</label>
    <input class="inp" id="l-user" placeholder="username" autocomplete="off">
    <label class="lbl">パスワード</label>
    <input class="inp" type="password" id="l-pass" placeholder="password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-g btn-w" onclick="doLogin()">ログイン</button>
    <div id="l-err" style="color:#c06060;font-size:13px;margin-top:10px;text-align:center"></div>
  </div>
</div>

<!-- MAIN -->
<div id="screen-main" class="hidden" style="display:flex;flex-direction:column;flex:1">
  <div class="topbar">
    <span class="logo">LUXE ESTHE</span>
    <span class="role-badge" id="roleBadge"></span>
    <span style="font-size:12px;color:var(--ts)" id="userLabel"></span>
    <div class="ml-auto row" style="gap:7px">
      <button class="btn btn-o btn-sm" onclick="doLogout()">ログアウト</button>
    </div>
  </div>
  <div class="nav">
    <button class="nb active" onclick="showPage('dash',this)">ダッシュボード</button>
    <button class="nb" onclick="showPage('therapist',this)">セラピスト一覧</button>
  </div>
  <div class="content">

    <!-- DASHBOARD -->
    <div class="page active" id="page-dash">
      <div class="sec" id="dashDate"></div>

      <!-- SHORTEST PANEL -->
      <div class="sp-panel">
        <div class="sp-hdr">
          <span class="sp-title">最短取得</span>
          <input class="sp-tinp" id="spTime" placeholder="HH:MM">
          <button class="sp-btn" onclick="spNow()">現在時刻</button>
          <button class="sp-btn-gold" onclick="spCalc()">再計算</button>
          <button class="btn btn-o btn-sm" onclick="openM('att')" style="margin-left:auto">出勤登録</button>
        </div>
        <table class="sp-tbl">
          <thead>
            <tr><th>セラピスト</th><th>最短開始</th><th>最大コース</th></tr>
          </thead>
          <tbody id="spTbody">
            <tr><td colspan="3" class="sp-empty">出勤登録がありません</td></tr>
          </tbody>
        </table>
        <div class="sp-sns-wrap">
          <div class="sp-sns-lbl">SNS用テキスト</div>
          <div class="sp-sns" id="spSns">—</div>
          <button class="sp-copy" onclick="spCopy()">コピー</button>
        </div>
      </div>
    </div>

    <!-- THERAPIST LIST -->
    <div class="page hidden" id="page-therapist">
      <div class="rb" style="margin-bottom:14px">
        <span class="sec" style="margin:0">セラピスト一覧</span>
        <button class="btn btn-g btn-sm" onclick="openM('newTh')">＋ 追加</button>
      </div>
      <div id="thList"></div>
    </div>

  </div>
</div>

<!-- MODALS -->
<div class="ov hidden" id="ov" onclick="closeOv(event)">

  <!-- 出勤登録 -->
  <div class="modal hidden" id="m-att">
    <div class="mt">出勤登録</div>
    <div style="font-size:12px;color:var(--ts);margin-bottom:12px">出勤セラピストの勤務時間を入力（空欄＝非出勤）<br>4桁入力で自動変換（例: 1000 → 10:00）</div>
    <div id="attRows"></div>
    <div class="row" style="justify-content:flex-end;gap:8px;margin-top:12px">
      <button class="btn btn-o" onclick="closeM()">キャンセル</button>
      <button class="btn btn-g" onclick="saveAtt()">登録</button>
    </div>
  </div>

  <!-- セラピスト追加・編集 -->
  <div class="modal hidden" id="m-newTh">
    <div class="mt" id="thModalTitle">セラピスト追加</div>
    <input type="hidden" id="th-id">
    <div class="g2">
      <div><label class="lbl">氏名</label><input class="inp" id="th-name" placeholder="田中 花子"></div>
      <div><label class="lbl">ポジション</label><input class="inp" id="th-pos" placeholder="セラピスト"></div>
    </div>
    <div class="divider"></div>
    <div style="font-size:12px;color:var(--gold);font-weight:500;margin-bottom:10px">プロフィール</div>
    <div class="g2">
      <div><label class="lbl">顔タイプ</label><input class="inp" id="th-face" placeholder="かわいい系"></div>
      <div><label class="lbl">スタイル</label><input class="inp" id="th-body" placeholder="スレンダー"></div>
    </div>
    <div class="g2">
      <div><label class="lbl">感度</label><input class="inp" id="th-kan" placeholder="敏感"></div>
      <div><label class="lbl">注意事項</label><input class="inp" id="th-caution" placeholder="施術禁止箇所等"></div>
    </div>
    <div class="g2">
      <div><label class="lbl">インターバル（分）</label><input type="number" class="inp" id="th-interval" placeholder="20"></div>
      <div><label class="lbl">指名料（円）</label><input type="number" class="inp" id="th-nomfee" placeholder="1000"></div>
    </div>
    <label class="lbl">メモ</label>
    <input class="inp" id="th-memo" placeholder="備考・特記事項">
    <div class="row" style="justify-content:flex-end;gap:8px;margin-top:8px">
      <button class="btn btn-o" onclick="closeM()">キャンセル</button>
      <button class="btn btn-g" onclick="saveTh()">保存</button>
    </div>
  </div>

</div>

<script>
// ── STORAGE ──
const ld=(k,d)=>{try{const v=localStorage.getItem('luxe_'+k);return v?JSON.parse(v):d}catch{return d}};
const sv=(k,v)=>{try{localStorage.setItem('luxe_'+k,JSON.stringify(v))}catch{}};

let CUR=null;

// ── INIT ──
function initData(){
  if(ld('init',false))return;
  sv('accounts',[
    {id:'dev',username:'developer',password:'dev2024',role:'dev',display:'製作者'},
    {id:'adm1',username:'admin',password:'admin123',role:'admin',display:'管理者'},
  ]);
  sv('therapists',[
    {id:1,name:'田中 彩',pos:'セラピスト',face:'かわいい系',body:'スレンダー',kan:'敏感',caution:'',interval:20,nomFee:1000,memo:''},
    {id:2,name:'田村 麻衣',pos:'セラピスト',face:'清楚系',body:'グラマー',kan:'普通',caution:'',interval:20,nomFee:1000,memo:''},
    {id:3,name:'中村 葵',pos:'セラピスト',face:'綺麗系',body:'スレンダー',kan:'強め',caution:'',interval:20,nomFee:2000,memo:'人気No.1'},
  ]);
  sv('attendance',[
    {therapistId:1,start:'10:00',end:'22:00'},
    {therapistId:2,start:'12:00',end:'22:00'},
    {therapistId:3,start:'10:00',end:'23:00'},
  ]);
  sv('nid',{th:10});
  sv('init',true);
}

function nid(t){const ids=ld('nid',{th:10});const id=(ids[t]||10)+1;ids[t]=id;sv('nid',ids);return id;}
function getToday(){return new Date().toISOString().slice(0,10);}
function fp(n){return '¥'+Number(n).toLocaleString();}

// ── AUTH ──
function doLogin(){
  const u=document.getElementById('l-user').value.trim();
  const p=document.getElementById('l-pass').value;
  const acc=ld('accounts',[]).find(a=>a.username===u&&a.password===p);
  if(!acc){document.getElementById('l-err').textContent='ユーザー名またはパスワードが違います';return;}
  CUR=acc;
  document.getElementById('screen-login').classList.add('hidden');
  const sm=document.getElementById('screen-main');sm.classList.remove('hidden');sm.style.display='flex';
  initData();
  applyRole();
  renderAll();
  spNow();
}
function doLogout(){
  CUR=null;
  document.getElementById('screen-main').classList.add('hidden');
  document.getElementById('screen-main').style.display='none';
  document.getElementById('screen-login').classList.remove('hidden');
  ['l-user','l-pass'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('l-err').textContent='';
}
function applyRole(){
  const r=CUR.role;
  const rb=document.getElementById('roleBadge');
  rb.className='role-badge '+(r==='dev'?'rb-dev':'rb-admin');
  rb.textContent=r==='dev'?'製作者':'管理者';
  document.getElementById('userLabel').textContent=CUR.display;
}

// ── RENDER ──
function renderAll(){
  renderDash();
  renderTherapists();
}

function renderDash(){
  const d=new Date();
  document.getElementById('dashDate').textContent=
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${'日月火水木金土'[d.getDay()]}）`;
  spCalc();
}

// ── SHORTEST CALCULATOR ──
// 現在時刻のビジネス表示: 0:00〜6:59 → +24h (27:00等)
function nowBusinessMins(){
  const n=new Date();
  let h=n.getHours(),m=n.getMinutes();
  if(h>=0&&h<=6)h+=24; // 深夜0〜6時は翌日扱い
  return h*60+m;
}
function minsToDisplay(mins){
  // 分→表示文字列（深夜またぎ対応）
  let h=Math.floor(mins/60),m=mins%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function tsToMins(ts){
  const parts=ts.split(':');
  return parseInt(parts[0])*60+parseInt(parts[1]);
}

function spNow(){
  const mins=nowBusinessMins();
  document.getElementById('spTime').value=minsToDisplay(mins);
}

function parseSpTime(str){
  // HH:MM → 分。深夜表記(27:00等)もそのまま受け付ける
  const parts=str.trim().split(':');
  if(parts.length!==2)return null;
  const h=parseInt(parts[0]),m=parseInt(parts[1]);
  if(isNaN(h)||isNaN(m))return null;
  return h*60+m;
}

function computeShortest(baseMins){
  const therapists=ld('therapists',[]);
  const attendance=ld('attendance',[]);
  const bookings=ld('bookings',[]).filter(b=>b.date===getToday()&&b.status!=='cancel');
  const results=[];

  for(const t of therapists){
    const att=attendance.find(a=>a.therapistId===t.id);
    if(!att)continue;

    const interval=t.interval||20;
    let bStart=tsToMins(att.start);
    let bEnd=tsToMins(att.end);
    // 深夜またぎ: end < start なら end+24h
    if(bEnd<=bStart)bEnd+=24*60;

    // 当日予約ブロック
    const tBks=bookings
      .filter(b=>b.therapistId===t.id)
      .map(b=>{
        const menu=ld('menus',[]).find(m=>m.id===b.menuId);
        const dur=menu?menu.time:60;
        const st=tsToMins(b.time);
        return{start:st,end:st+dur};
      })
      .sort((a,b)=>a.start-b.start);

    // baseline計算
    let baseline;
    if(baseMins<bStart){
      const p15=baseMins+15;
      baseline=p15>bStart?p15:bStart;
    } else {
      const inProg=tBks.find(r=>r.start<=baseMins&&baseMins<r.end);
      if(inProg){
        baseline=inProg.end+interval;
      } else {
        const prev=[...tBks].filter(r=>r.end<=baseMins).sort((a,b)=>b.end-a.end)[0];
        if(prev){
          const until=prev.end+interval;
          baseline=baseMins<until?until:baseMins+15;
        } else {
          const c=baseMins+15;
          baseline=c>bEnd?bEnd:c;
        }
      }
    }

    // ギャップ探索
    const blocks=[
      {k:0,s:bStart,e:bStart},
      ...tBks.map(r=>({k:1,s:r.start,e:r.end})),
      {k:0,s:bEnd,e:bEnd},
    ];
    let found=null;
    for(let i=0;i<blocks.length-1;i++){
      const L=blocks[i],R=blocks[i+1];
      let gS=L.k===1?L.e+interval:L.e;
      const gE=R.k===1?R.s-interval:R.s;
      if(gS<baseline)gS=baseline;
      if(gE<=gS)continue;
      const usable=Math.min(gE,bEnd);
      if(usable<=gS)continue;
      const free=usable-gS;
      if(free<60)continue;
      const mx=free>=120?120:free>=100?100:free>=80?80:60;
      found={start:gS,mx};
      break;
    }
    results.push({id:t.id,name:t.name,start:found?found.start:null,mx:found?found.mx:0});
  }

  return results.sort((a,b)=>{
    if(a.mx>0&&b.mx<=0)return -1;
    if(a.mx<=0&&b.mx>0)return 1;
    return(a.start??99999)-(b.start??99999);
  });
}

function mxTxt(mx){
  return mx>=120?'(60/80/100/120)':mx>=100?'(60/80/100)':mx>=80?'(60/80)':'(60)';
}

function sanName(name){
  if(!name)return 'さん';
  const s=name.trim();
  const isK=c=>{const code=c.charCodeAt(0);return(code>=0x4E00&&code<=0x9FFF)||code===0x3005;};
  const isH=c=>{const code=c.charCodeAt(0);return code>=0x3040&&code<=0x309F;};
  if(!s.length||!isK(s[0]))return s.split(' ')[0]+'さん';
  let last=-1;
  for(let i=0;i<s.length;i++){if(isK(s[i]))last=i;else if(isH(s[i]))break;}
  return(last>=0?s.slice(0,last+1):s.split(' ')[0])+'さん';
}

function spCalc(){
  const raw=document.getElementById('spTime')?.value||'';
  const base=parseSpTime(raw);
  if(base===null)return;
  const cands=computeShortest(base);
  const tbody=document.getElementById('spTbody');

  if(!cands.length){
    tbody.innerHTML='<tr><td colspan="3" class="sp-empty">出勤登録がありません</td></tr>';
    document.getElementById('spSns').textContent='—';
    return;
  }

  tbody.innerHTML=cands.map(c=>{
    const closed=c.mx<=0;
    const stStr=closed?'—':minsToDisplay(c.start);
    const mxStr=closed?'本日受付終了':mxTxt(c.mx);
    return `<tr${closed?' class="sp-closed"':''}>
      <td class="sp-nm">${c.name}</td>
      <td class="sp-st">${stStr}</td>
      <td class="sp-mx">${mxStr}</td>
    </tr>`;
  }).join('');

  // SNSテキスト
  const lines=cands.filter(c=>c.mx>0).map(c=>{
    // SNS表示は通常時刻表記（深夜は27:00等そのまま）
    return `${sanName(c.name)}　${minsToDisplay(c.start)}～`;
  });
  document.getElementById('spSns').textContent=
    lines.length?lines.join('\n'):'（受付可能なセラピストがいません）';
}

function spCopy(){
  const txt=document.getElementById('spSns').textContent;
  if(txt==='—')return;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=document.querySelector('.sp-copy');
    btn.textContent='コピーしました！';
    setTimeout(()=>btn.textContent='コピー',1800);
  });
}

// ── ATTENDANCE ──
function fmtTI(el){
  // すでにHH:MM形式ならスキップ
  if(/^\d{1,2}:\d{2}$/.test(el.value.trim()))return;
  let v=el.value.replace(/\D/g,'');
  if(!v)return;
  if(v.length===3)v='0'+v;
  if(v.length>4)v=v.slice(0,4);
  if(v.length<4)return;
  el.value=v.slice(0,2)+':'+v.slice(2,4);
}
function parseTI(raw){
  if(!raw)return'';
  if(/^\d{1,2}:\d{2}$/.test(raw.trim()))return raw.trim();
  let v=raw.replace(/\D/g,'');
  if(v.length===3)v='0'+v;
  if(v.length<4)return'';
  return v.slice(0,2)+':'+v.slice(2,4);
}

function openAtt(){
  const therapists=ld('therapists',[]);
  const att=ld('attendance',[]);
  document.getElementById('attRows').innerHTML=therapists.map(t=>{
    const a=att.find(x=>x.therapistId===t.id);
    return `<div class="att-row">
      <span class="att-nm">${t.name}</span>
      <input class="inp-sm" style="width:74px;text-align:center" id="as-${t.id}"
        placeholder="1000" value="${a?.start||''}"
        onblur="fmtTI(this)"
        onkeydown="if(event.key==='Enter'||event.key==='Tab')fmtTI(this)">
      <span style="color:var(--tm);font-size:14px">〜</span>
      <input class="inp-sm" style="width:74px;text-align:center" id="ae-${t.id}"
        placeholder="2200" value="${a?.end||''}"
        onblur="fmtTI(this)"
        onkeydown="if(event.key==='Enter'||event.key==='Tab')fmtTI(this)">
      <button class="btn btn-d btn-sm" onclick="clearAR(${t.id})">クリア</button>
    </div>`;
  }).join('')||'<div style="color:var(--tm);font-size:13px">セラピストが登録されていません</div>';
}

function clearAR(id){
  const s=document.getElementById('as-'+id),e=document.getElementById('ae-'+id);
  if(s)s.value='';if(e)e.value='';
}

function saveAtt(){
  const therapists=ld('therapists',[]);
  const att=[];
  for(const t of therapists){
    const sEl=document.getElementById('as-'+t.id);
    const eEl=document.getElementById('ae-'+t.id);
    if(!sEl||!eEl)continue;
    fmtTI(sEl);fmtTI(eEl);
    const start=parseTI(sEl.value);
    const end=parseTI(eEl.value);
    if(!start&&!end)continue;
    if(!start||!end){alert(t.name+': 開始・終了の両方を入力してください');return;}
    att.push({therapistId:t.id,start,end});
  }
  sv('attendance',att);
  closeM();
  spCalc();
  renderTherapists();
}

// ── THERAPISTS ──
function renderTherapists(){
  const att=ld('attendance',[]);
  const therapists=ld('therapists',[]);
  document.getElementById('thList').innerHTML=therapists.map(t=>{
    const a=att.find(x=>x.therapistId===t.id);
    const attBadge=a?`<span class="tag t-att">${a.start}〜${a.end}</span>`:'';
    const tags=[
      t.face?`<span class="prof-tag">顔: <b>${t.face}</b></span>`:'',
      t.body?`<span class="prof-tag">体型: <b>${t.body}</b></span>`:'',
      t.kan?`<span class="prof-tag">感度: <b>${t.kan}</b></span>`:'',
      t.interval?`<span class="prof-tag">INT: <b>${t.interval}分</b></span>`:'',
      t.nomFee?`<span class="prof-tag">指名料: <b>${fp(t.nomFee)}</b></span>`:'',
      t.caution?`<span class="prof-tag">注意: <b>${t.caution}</b></span>`:'',
      t.memo?`<span class="prof-tag">memo: <b>${t.memo}</b></span>`:'',
    ].filter(Boolean).join('');
    return `<div class="th-item">
      <div class="th-hdr">
        <div class="avatar">${t.name.charAt(0)}</div>
        <div style="flex:1">
          <div class="th-name" style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
            ${t.name}${attBadge}
          </div>
          <div class="th-sub">${t.pos||'セラピスト'}</div>
        </div>
        <div class="row" style="gap:6px">
          <button class="btn btn-o btn-sm" onclick="openEditTh(${t.id})">編集</button>
          <button class="btn btn-d btn-sm" onclick="deleteTh(${t.id})">削除</button>
        </div>
      </div>
      ${tags?`<div class="prof-wrap">${tags}</div>`:''}
    </div>`;
  }).join('')||'<div style="color:var(--tm);font-size:13px;padding:10px 0">セラピストが登録されていません</div>';
}

function openEditTh(id){
  const t=ld('therapists',[]).find(x=>x.id===id);if(!t)return;
  document.getElementById('thModalTitle').textContent='セラピスト編集';
  document.getElementById('th-id').value=id;
  document.getElementById('th-name').value=t.name;
  document.getElementById('th-pos').value=t.pos||'';
  document.getElementById('th-face').value=t.face||'';
  document.getElementById('th-body').value=t.body||'';
  document.getElementById('th-kan').value=t.kan||'';
  document.getElementById('th-caution').value=t.caution||'';
  document.getElementById('th-interval').value=t.interval||'';
  document.getElementById('th-nomfee').value=t.nomFee||'';
  document.getElementById('th-memo').value=t.memo||'';
  openM('newTh');
}

function saveTh(){
  const id=document.getElementById('th-id').value;
  const name=document.getElementById('th-name').value.trim();
  if(!name){alert('氏名を入力してください');return;}
  const data={
    name,
    pos:document.getElementById('th-pos').value.trim(),
    face:document.getElementById('th-face').value.trim(),
    body:document.getElementById('th-body').value.trim(),
    kan:document.getElementById('th-kan').value.trim(),
    caution:document.getElementById('th-caution').value.trim(),
    interval:parseInt(document.getElementById('th-interval').value)||20,
    nomFee:parseInt(document.getElementById('th-nomfee').value)||1000,
    memo:document.getElementById('th-memo').value.trim(),
  };
  const list=ld('therapists',[]);
  if(!id){
    list.push({id:nid('th'),...data});
  } else {
    const idx=list.findIndex(x=>x.id===parseInt(id));
    if(idx>=0)list[idx]={...list[idx],...data};
  }
  sv('therapists',list);
  closeM();
  renderTherapists();
  spCalc();
}

function deleteTh(id){
  if(!confirm('削除しますか？'))return;
  sv('therapists',ld('therapists',[]).filter(t=>t.id!==id));
  sv('attendance',ld('attendance',[]).filter(a=>a.therapistId!==id));
  renderTherapists();
  spCalc();
}

// ── MODAL ──
function openM(name){
  document.getElementById('ov').classList.remove('hidden');
  document.querySelectorAll('.modal').forEach(m=>m.classList.add('hidden'));
  document.getElementById('m-'+name).classList.remove('hidden');
  if(name==='att')openAtt();
  if(name==='newTh'){
    document.getElementById('thModalTitle').textContent='セラピスト追加';
    ['th-id','th-name','th-pos','th-face','th-body','th-kan','th-caution','th-interval','th-nomfee','th-memo']
      .forEach(i=>document.getElementById(i).value='');
  }
}
function closeM(){
  document.getElementById('ov').classList.add('hidden');
  document.querySelectorAll('.modal').forEach(m=>m.classList.add('hidden'));
}
function closeOv(e){if(e.target.id==='ov')closeM();}

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>{p.classList.add('hidden');p.classList.remove('active')});
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  const p=document.getElementById('page-'+name);
  if(p){p.classList.remove('hidden');p.classList.add('active');}
  if(btn)btn.classList.add('active');
}
</script>
